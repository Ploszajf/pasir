services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    command: 
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ploszaj_filip_gi_spring?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5174:8080"
    depends_on:
      - backend

volumes:
  mysql_data: